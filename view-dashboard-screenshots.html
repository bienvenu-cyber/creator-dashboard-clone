<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Screenshots Gallery - FakeDash</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f0f0f;
  color: #fff;
  padding: 20px;
}
.header {
  text-align: center;
  padding: 40px 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 12px;
  margin-bottom: 40px;
}
.header h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}
.header p {
  font-size: 1.1rem;
  opacity: 0.9;
}
.stats {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.stat-card {
  background: #1a1a1a;
  padding: 20px 30px;
  border-radius: 8px;
  border: 1px solid #333;
}
.stat-card .number {
  font-size: 2rem;
  font-weight: 700;
  color: #667eea;
}
.stat-card .label {
  font-size: 0.9rem;
  color: #999;
  margin-top: 5px;
}
.filters {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 30px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 10px 20px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 20px;
  color: #fff;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 0.9rem;
}
.filter-btn:hover {
  background: #667eea;
  border-color: #667eea;
}
.filter-btn.active {
  background: #667eea;
  border-color: #667eea;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 20px;
  max-width: 1400px;
  margin: 0 auto;
}
.card {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #333;
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
  border-color: #667eea;
}
.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  display: block;
}
.card-info {
  padding: 15px;
}
.card-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 5px;
  color: #fff;
}
.card-meta {
  font-size: 0.85rem;
  color: #999;
}
.badge {
  display: inline-block;
  padding: 4px 10px;
  background: #667eea;
  border-radius: 12px;
  font-size: 0.75rem;
  margin-top: 8px;
  font-weight: 600;
}
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal.active {
  display: flex;
}
.modal-content {
  max-width: 90%;
  max-height: 90%;
  position: relative;
}
.modal-content img {
  max-width: 100%;
  max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}
.modal-close {
  position: absolute;
  top: -40px;
  right: 0;
  background: #667eea;
  color: #fff;
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.5rem;
  line-height: 1;
}
.modal-close:hover {
  background: #764ba2;
}
.empty {
  text-align: center;
  padding: 60px 20px;
  color: #666;
}
</style>
</head>
<body>

<div class="header">
  <h1>📸 Dashboard Screenshots Gallery</h1>
  <p>Captures d'écran extraites de FakeDash.com</p>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="number" id="totalCount">53</div>
    <div class="label">Screenshots</div>
  </div>
  <div class="stat-card">
    <div class="number">5.7 MB</div>
    <div class="label">Taille totale</div>
  </div>
  <div class="stat-card">
    <div class="number">7</div>
    <div class="label">Dashboards</div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">Tous</button>
  <button class="filter-btn" data-filter="onlyfans">OnlyFans</button>
  <button class="filter-btn" data-filter="shopify">Shopify</button>
  <button class="filter-btn" data-filter="stripe">Stripe</button>
  <button class="filter-btn" data-filter="mym">MYM</button>
  <button class="filter-btn" data-filter="infloww">Infloww</button>
  <button class="filter-btn" data-filter="fanvue">Fanvue</button>
  <button class="filter-btn" data-filter="beacons">Beacons</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <img id="modalImg" src="" alt="">
  </div>
</div>

<script>
const screenshots = [
  // OnlyFans
  { name: 'Onlyfans-Agency-1.jpg', type: 'onlyfans', title: 'OnlyFans Dashboard - Vue principale', size: '1000x1000' },
  { name: 'Onlyfans-Agency-2.jpg', type: 'onlyfans', title: 'OnlyFans Dashboard - Statistiques', size: '200x300' },
  { name: 'Onlyfans-Agency-3.jpg', type: 'onlyfans', title: 'OnlyFans Dashboard - Revenus', size: '200x300' },
  { name: 'of.png', type: 'onlyfans', title: 'OnlyFans Logo', size: 'logo' },
  
  // Shopify
  { name: 'Fake-Dashboard-Shopify-1.jpg', type: 'shopify', title: 'Shopify Dashboard - Vue complète', size: '1024x677' },
  { name: 'Fake-Dashboard-Shopify.jpg', type: 'shopify', title: 'Shopify Dashboard - Alternative', size: 'full' },
  
  // Stripe
  { name: 'Fake-Stripe-Dashboard-1.jpg', type: 'stripe', title: 'Stripe Dashboard - Paiements', size: '768x495' },
  { name: 'Fake-Stripe-Dashboard.jpg', type: 'stripe', title: 'Stripe Dashboard - Vue principale', size: 'full' },
  { name: 'stripedash.jpg', type: 'stripe', title: 'Stripe Dashboard - Aperçu', size: 'preview' },
  
  // MYM
  { name: 'mymlogo.png', type: 'mym', title: 'MYM Logo', size: 'logo' },
  
  // Infloww
  { name: 'inflowwlogo.png', type: 'infloww', title: 'Infloww Logo', size: 'logo' },
  
  // Fanvue
  { name: 'fanvue.png', type: 'fanvue', title: 'Fanvue Logo', size: 'logo' },
  
  // Generic
  { name: 'Fake-Dashboard.jpg', type: 'generic', title: 'Dashboard Générique', size: 'full' }
];

function renderGallery(filter = 'all') {
  const gallery = document.getElementById('gallery');
  const filtered = filter === 'all' ? screenshots : screenshots.filter(s => s.type === filter);
  
  if (filtered.length === 0) {
    gallery.innerHTML = '<div class="empty">Aucun screenshot trouvé pour ce filtre</div>';
    return;
  }
  
  gallery.innerHTML = filtered.map(shot => `
    <div class="card" onclick="openModal('dashboard-screenshots/${shot.name}')">
      <img src="dashboard-screenshots/${shot.name}" alt="${shot.title}" loading="lazy">
      <div class="card-info">
        <div class="card-title">${shot.title}</div>
        <div class="card-meta">${shot.name}</div>
        <span class="badge">${shot.type.toUpperCase()}</span>
      </div>
    </div>
  `).join('');
  
  document.getElementById('totalCount').textContent = filtered.length;
}

function openModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderGallery(this.dataset.filter);
  });
});

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

renderGallery();
</script>

</body>
</html>
